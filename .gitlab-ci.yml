stages:
  - deploy

variables:
  PROJECT_ID: question-agent-ytt

deploy:
  stage: deploy
  image: node:22
  only:
    - master
  before_script:
    - npm install -g firebase-tools
    - npm ci
  script:
    - npm run build
    - firebase deploy --only hosting --project=$PROJECT_ID --token "$FIREBASE_TOKEN"
  environment:
    name: production
