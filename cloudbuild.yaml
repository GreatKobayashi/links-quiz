steps:
  - name: node:22
    entrypoint: npm
    args: [ci]

  - name: node:22
    entrypoint: npm
    args: [run, build]
    env:
      - VITE_API_BASE=$_VITE_API_BASE

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        npm install -g firebase-tools
        firebase deploy --only hosting --project=$PROJECT_ID --token "$$FIREBASE_TOKEN"
    secretEnv: [FIREBASE_TOKEN]

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/firebase-ci-token/versions/latest
      env: FIREBASE_TOKEN

substitutions:
  _VITE_API_BASE: ""

options:
  logging: CLOUD_LOGGING_ONLY
